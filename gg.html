<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message for Nihit</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Arial', sans-serif;
            margin: 0;
        }
        .message-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ff4757;
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        span {
            color: #ff4757;
            font-weight: bold;
        }
        p {
            color: #555;
            font-size: 1.2em;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="message-card">
        <h1><span>U are dumb and shitass</span></h1>
        <p>— by Nihit</p>
    </div>
</body>
</html>
